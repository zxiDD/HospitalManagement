<div class="card p-3">

  <!-- Header -->
  <div class="d-flex justify-content-between mb-3">
    <h4>Patients Report</h4>
  </div>

  <!-- Cards -->
  <div class="row g-3 mb-4">

    <div class="col-md-4">
      <div class="card text-center p-3">
        <i class="bi bi-people fs-2 text-primary"></i>
        <h6>Total Patients</h6>
        <h3>{{totalPatients}}</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center p-3">
        <i class="bi bi-person-plus fs-2 text-success"></i>
        <h6>New Patients</h6>
        <h3>{{newPatients}}</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center p-3">
        <i class="bi bi-heart-pulse fs-2 text-danger"></i>
        <h6>Active Patients</h6>
        <h3>{{activePatients}}</h3>
      </div>
    </div>

  </div>


</div>
