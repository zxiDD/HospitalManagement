<div class="card p-3">

  <!-- 🔹 Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Patients</h4>

    <button class="btn btn-primary">
      <i class="bi bi-plus"></i> Add Patient
    </button>
  </div>

  <!-- 🔹 Breadcrumb + Search -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <div>
      <span class="text-muted">Dashboard / </span>
      <span class="fw-bold">Patients</span>
    </div>

    <input
      type="text"
      class="form-control w-25"
      placeholder="Search patient..."
      [(ngModel)]="searchText"
    />

  </div>

  <!-- 🔹 Table -->
  <div class="table-responsive">

    <table class="table table-hover align-middle">

      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Address</th>
          <th>Phone</th>
          <th>Date of Birth</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let p of filteredPatients(); let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ p.name }}</td>
          <td>{{ p.address }}</td>
          <td>{{ p.phone }}</td>
          <td>{{ p.dob }}</td>

          <td class="text-center">

            <button class="btn btn-warning btn-sm me-2">
              <i class="bi bi-pencil"></i> Edit
            </button>

            <button class="btn btn-danger btn-sm">
              <i class="bi bi-trash"></i> Delete
            </button>

          </td>
        </tr>

        <!-- 🔹 Empty State -->
        <tr *ngIf="filteredPatients().length === 0">
          <td colspan="6" class="text-center text-muted">
            No patients found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

  <!-- 🔹 Footer / Pagination UI (Static for now) -->
  <div class="d-flex justify-content-between align-items-center mt-3">

    <div class="text-muted">
      Showing {{ filteredPatients().length }} entries
    </div>

    <div>
      <button class="btn btn-light btn-sm me-1">Previous</button>
      <button class="btn btn-primary btn-sm me-1">1</button>
      <button class="btn btn-light btn-sm me-1">2</button>
      <button class="btn btn-light btn-sm me-1">3</button>
      <button class="btn btn-light btn-sm">Next</button>
    </div>

  </div>

</div>
