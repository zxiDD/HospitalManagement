<!-- HEADER -->
<div class="text-white text-center py-5"
     style="background: linear-gradient(135deg, #6dd5ed, #2193b0);">
  <h2 class="fw-bold">Contact Us</h2>
  <p>We are here to help you</p>
</div>

<!-- CONTENT -->
<div class="container py-5">
  <div class="row">

    <!-- LEFT INFO -->
    <div class="col-md-5">
      <h4 class="mb-3">Get In Touch</h4>
      <p>Feel free to contact us for any queries.</p>

      <div class="mb-3">
        <strong>📞 Phone:</strong> +91 9876543210
      </div>

      <div class="mb-3">
        <strong>📧 Email:</strong>
        <a href="mailto:support&#64;hms.com">support&#64;hms.com</a>
      </div>

      <div class="mb-3">
        <strong>📍 Address:</strong> Delhi, India
      </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="col-md-7">
      <div class="p-4 shadow rounded">

        <div class="row">
          <div class="col-md-6 mb-3">
            <input 
              class="form-control"
              [(ngModel)]="name"
              name="name"
              placeholder="Name">
          </div>

          <div class="col-md-6 mb-3">
            <input 
              class="form-control"
              [(ngModel)]="email"
              name="email"
              placeholder="Email">
          </div>
        </div>

        <input 
          class="form-control mb-3"
          [(ngModel)]="phone"
          name="phone"
          placeholder="Phone">

        <textarea 
          class="form-control mb-3"
          rows="4"
          [(ngModel)]="message"
          name="message"
          placeholder="Message">
        </textarea>

        <button class="btn btn-primary w-100" (click)="onSubmit()">
          Submit
        </button>

        <!-- Messages -->
        <p class="text-success text-center mt-2">{{ successMessage }}</p>
        <p class="text-danger text-center mt-2">{{ errorMessage }}</p>

      </div>
    </div>

  </div>
</div>

<!-- MAP -->
<div class="container mb-5">
  <iframe 
    src="https://www.google.com/maps?q=Delhi&output=embed"
    width="100%" height="300" style="border:0;">
  </iframe>
</div>

<!-- FOOTER -->
<div class="text-white text-center p-4"
     style="background:#1e3c72;">
  <p>© 2026 GOMEDIC | All Rights Reserved</p>
</div>
