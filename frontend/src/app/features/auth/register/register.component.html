<div class="container-fluid vh-100 d-flex justify-content-center align-items-center"
     style="background: url('assets/images/LoginImage.jpg') no-repeat center center/cover; position: relative;">

  <!-- Overlay -->
  <div style="
        position: absolute;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(10px);
        background: rgba(0, 0, 0, 0.4);
      ">
  </div>

  <!-- Register Card -->
  <div class="p-4 position-relative text-white"
       style="
         width: 420px;
         border-radius: 16px;
         background: rgba(255, 255, 255, 0.1);
         backdrop-filter: blur(15px);
         box-shadow: 0 8px 32px rgba(0,0,0,0.3);
         z-index: 2;
       ">

    <h3 class="text-center mb-4 fw-bold">Patient Registration</h3>

    <!-- Username -->
    <div class="mb-3 position-relative">
      <i class="bi bi-person-fill position-absolute"
         style="top: 10px; left: 10px;"></i>
      <input 
        type="text"
        [(ngModel)]="username"
        class="form-control ps-5"
        placeholder="Username"
        style="background: rgba(255,255,255,0.2); border: none; color: white;">
    </div>

    <!-- Password -->
    <div class="mb-3 position-relative">
      <i class="bi bi-lock-fill position-absolute"
         style="top: 10px; left: 10px;"></i>

      <input 
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        class="form-control ps-5 pe-5"
        placeholder="Password"
        style="background: rgba(255,255,255,0.2); border: none; color: white;">

      <i class="bi"
         [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
         (click)="showPassword = !showPassword"
         style="position: absolute; right: 10px; top: 10px; cursor: pointer;">
      </i>
    </div>

    <!-- Patient Name -->
    <div class="mb-3">
      <input [(ngModel)]="patientName"
             class="form-control"
             placeholder="Patient Name"
             style="background: rgba(255,255,255,0.2); border:none; color:white;">
    </div>

    <!-- Phone -->
    <div class="mb-3">
      <input [(ngModel)]="phoneNo"
             class="form-control"
             placeholder="Phone Number"
             style="background: rgba(255,255,255,0.2); border:none; color:white;">
    </div>

    <!-- Address -->
    <div class="mb-3">
      <input [(ngModel)]="address"
             class="form-control"
             placeholder="Address"
             style="background: rgba(255,255,255,0.2); border:none; color:white;">
    </div>

    <!-- SSN -->
    <div class="mb-3">
      <input type="number"
             [(ngModel)]="ssn"
             class="form-control"
             placeholder="SSN"
             style="background: rgba(255,255,255,0.2); border:none; color:white;">
    </div>

    <!-- Insurance ID -->
    <div class="mb-3">
      <input type="number"
             [(ngModel)]="insuranceId"
             class="form-control"
             placeholder="Insurance ID"
             style="background: rgba(255,255,255,0.2); border:none; color:white;">
    </div>

    <!-- Button -->
    <button class="btn w-100 fw-bold"
            style="background: linear-gradient(45deg, #4facfe, #00f2fe); border: none;"
            (click)="onRegister()">
      Register 
    </button>

    <!-- Message -->
    <p class="text-center mt-3 text-info">{{ message }}</p>

    <!-- Login Redirect -->
    <div class="text-center mt-3">
      <a routerLink="/login" class="text-white text-decoration-underline">
        Already have an account? Login
      </a>
    </div>

  </div>
</div>
