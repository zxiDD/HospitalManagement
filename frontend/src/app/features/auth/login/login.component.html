<div class="container-fluid vh-100 d-flex justify-content-center align-items-center"
     style="background: url('assets/images/LoginImage.jpg') no-repeat center center/cover; position: relative;">

  <!-- Overlay -->
  <div style="
        position: absolute;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(10px);
        background: rgba(0, 0, 0, 0.4);
      ">
  </div>

  <!-- Login Card -->
  <div class="p-4 position-relative text-white"
       style="
         width: 380px;
         border-radius: 16px;
         background: rgba(255, 255, 255, 0.1);
         backdrop-filter: blur(15px);
         box-shadow: 0 8px 32px rgba(0,0,0,0.3);
         z-index: 2;
       ">

    <h3 class="text-center mb-4 fw-bold">Hospital Login</h3>

    <!-- Username -->
    <div class="mb-3 position-relative">
      <i class="bi bi-person-fill position-absolute"
         style="top: 10px; left: 10px;"></i>
      <input 
        type="text"
        [(ngModel)]="username"
        class="form-control ps-5"
        placeholder="Username"
        style="background: rgba(255,255,255,0.2); border: none; color: white;">
    </div>

    <!-- Password -->
    <div class="mb-3 position-relative">
      <i class="bi bi-lock-fill position-absolute"
         style="top: 10px; left: 10px;"></i>

      <input 
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        class="form-control ps-5 pe-5"
        placeholder="Password"
        style="background: rgba(255,255,255,0.2); border: none; color: white;">

      <!-- Eye Icon -->
      <i class="bi"
         [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
         (click)="showPassword = !showPassword"
         style="position: absolute; right: 10px; top: 10px; cursor: pointer;">
      </i>
    </div>

    <!-- Button -->
    <button class="btn w-100 fw-bold"
            style="background: linear-gradient(45deg, #4facfe, #00f2fe); border: none;"
            (click)="onLogin()">
      Login
    </button>

    <!-- Signup -->
    <div class="text-center mt-3">
      <a routerLink="/register" class="text-white text-decoration-underline">
        Don't have an account? Signup
      </a>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage"
     class="text-center mt-3 px-3 py-2"
     style="
       background: rgba(255, 0, 0, 0.1);
       color: #ff6b6b;
       border-radius: 8px;
       font-size: 14px;
     ">
  {{ errorMessage }}
</div>

  </div>
</div>
